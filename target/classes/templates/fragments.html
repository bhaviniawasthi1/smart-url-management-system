<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!--
    Thymeleaf fragments for reusability across pages.
    Usage: th:replace="~{fragments :: head(title)}"
-->

<!-- Shared head fragment -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Smart URL Manager'">Smart URL Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</th:block>

<!-- Navigation bar — adapts based on auth state (client-side) -->
<th:block th:fragment="navbar">
    <nav>
        <a href="/" class="brand">🔗 Smart URL Manager</a>
        <div class="nav-links">
            <!-- Guest links (shown when NOT logged in) -->
            <span id="guest-links">
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            </span>
            <!-- User links (shown when logged in) -->
            <span id="user-links" style="display:none;">
                <a href="/dashboard">My Dashboard</a>
                <a href="/urls">My URLs</a>
                <a href="/urls/create">Create URL</a>
                <a href="#" onclick="event.preventDefault(); localStorage.removeItem('token'); window.location.href='/';">Logout</a>
            </span>
            <a href="/swagger-ui.html" target="_blank" title="API Docs">📖 API</a>
        </div>
    </nav>
    <script>
        var params = new URLSearchParams(window.location.search);
        if (localStorage.getItem('token') && params.get('view') !== 'guest') {
            document.getElementById('guest-links').style.display = 'none';
            document.getElementById('user-links').style.display = 'inline';
        }
    </script>
</th:block>

<!-- Footer -->
<th:block th:fragment="footer">
    <div class="text-center text-muted mt-2" style="padding: 1rem 0;">
        Smart URL Management System — College Internship Project
    </div>
</th:block>

<!-- Flash message display -->
<th:block th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
</th:block>

</body>
</html>
