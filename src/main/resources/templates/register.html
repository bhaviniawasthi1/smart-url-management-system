<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head(title='Register')}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments :: alerts}"></div>

    <a href="javascript:history.back()" class="btn btn-outline btn-sm mb-1">&larr; Back</a>

    <div class="card" style="max-width: 480px; margin: 2rem auto;">
        <h2 style="margin-bottom: 1.5rem;">Register</h2>

        <form>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control"
                       placeholder="Choose a username (3-50 characters)" required minlength="3" maxlength="50">
                <div id="username-error" class="alert alert-error" style="display: none;"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control"
                       placeholder="Enter your email" required>
                <div id="email-error" class="alert alert-error" style="display: none;"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control"
                       placeholder="At least 8 characters" required minlength="8">
                <small class="text-muted">Must include uppercase, lowercase, digit, and special character.</small>
                <div id="password-error" class="alert alert-error" style="display: none;"></div>
            </div>

            <div id="general-error" class="alert alert-error" style="display: none;"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>

        <p class="text-center text-muted mt-2">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script>
    function hideAllErrors() {
        document.querySelectorAll('.alert-error').forEach(el => el.style.display = 'none');
    }

    document.querySelector('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideAllErrors();

        const password = document.getElementById('password').value;
        const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
        if (!passwordPattern.test(password)) {
            document.getElementById('password-error').textContent =
                'Password must be at least 8 characters with uppercase, lowercase, digit, and special character.';
            document.getElementById('password-error').style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: password
                })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.data.token);
                window.location.href = '/dashboard';
            } else {
                if (data.data && data.data.password) {
                    document.getElementById('password-error').textContent = data.data.password;
                    document.getElementById('password-error').style.display = 'block';
                } else if (data.data && data.data.username) {
                    document.getElementById('username-error').textContent = data.data.username;
                    document.getElementById('username-error').style.display = 'block';
                } else if (data.data && data.data.email) {
                    document.getElementById('email-error').textContent = data.data.email;
                    document.getElementById('email-error').style.display = 'block';
                } else {
                    document.getElementById('general-error').textContent = data.message || 'Registration failed';
                    document.getElementById('general-error').style.display = 'block';
                }
            }
        } catch (err) {
            document.getElementById('general-error').textContent = 'Registration failed. Please try again.';
            document.getElementById('general-error').style.display = 'block';
        }
    });
</script>

</body>
</html>
