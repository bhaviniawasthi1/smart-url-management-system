<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head(title='Password Required')}"></th:block>
</head>
<body>

<nav>
    <a href="/?view=guest" class="brand">
        <span class="brand-logo">⚡</span>
        LynkForge
    </a>
    <div class="nav-links">
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width: 480px; margin: 2rem auto;">
        <h2 style="margin-bottom: 1.5rem;">Password Required</h2>
        <p class="text-muted" style="margin-bottom: 1.5rem;">
            This shortened URL is password protected. Please enter the password to continue.
        </p>

        <form>
            <input type="hidden" id="shortCode" th:value="${shortCode}">
            <div class="form-group">
                <label for="urlPassword">Password</label>
                <input type="password" id="urlPassword" class="form-control"
                       placeholder="Enter the URL password" required>
            </div>

            <div id="password-error" class="alert alert-error" style="display: none;"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Unlock Link</button>
        </form>

        <p class="text-center text-muted mt-2">
            <a href="/?view=guest">Go to Home</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script>
    document.querySelector('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('password-error');
        errorDiv.style.display = 'none';
        const shortCode = document.getElementById('shortCode').value;
        const password = document.getElementById('urlPassword').value;
        try {
            const res = await fetch('/api/v1/urls/' + shortCode + '/verify-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: password})
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = data.data.longUrl;
            } else {
                errorDiv.textContent = data.message || 'Incorrect password. Please try again.';
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'An error occurred. Please try again.';
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
