<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head(title='My URLs')}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments :: alerts}"></div>

    <a href="javascript:history.back()" class="back-link">&larr; Back</a>

    <div class="flex-between" style="margin-bottom: 1rem;">
        <h1>My URLs</h1>
        <a href="/urls/create" class="btn btn-primary">+ Create URL</a>
    </div>

    <div id="url-list">
        <p class="text-muted">Loading your URLs...</p>
    </div>

    <div id="analytics-modal" class="analytics-modal" style="display:none;"></div>

    <div id="confirm-modal" class="confirm-modal" style="display:none;" onclick="if(event.target===this)closeConfirm()">
        <div class="card">
            <h3>Delete URL</h3>
            <p>Are you sure you want to delete this URL? This action cannot be undone.</p>
            <div style="display:flex; gap: 0.75rem; justify-content: center;">
                <button class="btn btn-outline" onclick="closeConfirm()">Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script>
    let urlsData = [];

    async function loadUrls() {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; return; }
        try {
            const res = await fetch('/api/v1/urls', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            urlsData = data.data || [];
            renderTable();
        } catch (err) {
            document.getElementById('url-list').innerHTML = '<div class="alert alert-error">Failed to load URLs.</div>';
        }
    }

    function renderTable() {
        const container = document.getElementById('url-list');
        if (!urlsData.length) {
            container.innerHTML = '<div class="card"><p class="text-muted">No URLs yet. <a href="/urls/create">Create your first one!</a></p></div>';
            return;
        }
        let html = '<table><thead><tr><th>Short URL</th><th>Long URL</th><th>Clicks</th><th>Created</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        urlsData.forEach(u => {
            const status = u.expired ? 'Expired' : (u.enabled ? 'Active' : 'Disabled');
            const date = new Date(u.createdAt).toLocaleDateString();
            const expiry = u.expiresAt ? new Date(u.expiresAt).toLocaleDateString() : 'No expiry';
            const badgeClass = u.expired ? 'error' : (u.enabled ? 'success' : 'error');
            html += `<tr>
                <td><a href="${u.shortUrl}" target="_blank">${u.shortCode}</a></td>
                <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${u.longUrl}">${u.longUrl}</td>
                <td>${u.clickCount}</td>
                <td>${date}</td>
                <td>${expiry}</td>
                <td><span class="badge badge-${badgeClass}">${status}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline" onclick="copyUrl('${u.shortUrl}', this)" title="Copy short URL">📋</button>
                    <button class="btn btn-sm btn-outline" onclick="viewAnalytics(${u.id})" title="View analytics">📊</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteUrl(${u.id})" title="Delete URL">🗑️</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function copyUrl(shortUrl, btn) {
        navigator.clipboard.writeText(shortUrl);
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = '📋', 2000);
    }

    async function viewAnalytics(id) {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            const res = await fetch('/api/v1/analytics/urls/' + id, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            const modal = document.getElementById('analytics-modal');
            if (data.success) {
                const a = data.data;
                modal.style.display = 'flex';
                modal.innerHTML = '<div class="card fade-in"><div class="flex-between"><h3>Analytics: ' + a.shortCode + '</h3><button class="btn btn-sm btn-outline" onclick="document.getElementById(\'analytics-modal\').style.display=\'none\'">✕</button></div>' +
                    '<div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">' +
                    '<div class="stat-card"><div class="stat-value">' + a.totalClicks + '</div><div class="stat-label">Total</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + a.clicksToday + '</div><div class="stat-label">Today</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + a.clicksThisWeek + '</div><div class="stat-label">This Week</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + a.clicksThisMonth + '</div><div class="stat-label">This Month</div></div>' +
                    '</div>' +
                    '<p style="margin-top:0.5rem;"><a href="' + a.longUrl + '" target="_blank">' + a.longUrl + '</a></p>' +
                    '</div>';
            } else {
                document.getElementById('analytics-modal').innerHTML = '<div class="card"><p class="text-muted">' + (data.message || 'Failed to load analytics') + '</p><button class="btn btn-sm btn-outline mt-1" onclick="document.getElementById(\'analytics-modal\').style.display=\'none\'">Close</button></div>';
                document.getElementById('analytics-modal').style.display = 'flex';
            }
        } catch (err) {
            document.getElementById('analytics-modal').innerHTML = '<div class="card"><p class="text-muted">Failed to load analytics</p><button class="btn btn-sm btn-outline mt-1" onclick="document.getElementById(\'analytics-modal\').style.display=\'none\'">Close</button></div>';
            document.getElementById('analytics-modal').style.display = 'flex';
        }
    }

    let pendingDeleteId = null;

    function closeConfirm() {
        document.getElementById('confirm-modal').style.display = 'none';
        pendingDeleteId = null;
    }

    function deleteUrl(id) {
        pendingDeleteId = id;
        document.getElementById('confirm-modal').style.display = 'flex';
    }

    document.getElementById('confirm-delete-btn').addEventListener('click', async function() {
        const id = pendingDeleteId;
        if (id == null) return;
        closeConfirm();
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            const res = await fetch('/api/v1/urls/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (data.success) {
                urlsData = urlsData.filter(u => u.id !== id);
                renderTable();
            } else {
                document.getElementById('url-list').innerHTML = '<div class="alert alert-error">' + (data.message || 'Failed to delete URL') + '</div>' + document.getElementById('url-list').innerHTML;
            }
        } catch (err) {
            document.getElementById('url-list').innerHTML = '<div class="alert alert-error">Failed to delete URL</div>' + document.getElementById('url-list').innerHTML;
        }
    });

    loadUrls();
</script>

</body>
</html>
