# MySQL profile: for production-like deployment
# Activate with: --spring.profiles.active=mysql
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smarturl_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false